<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineSearch</title>

    <link rel="stylesheet" href="index.css">

    <!-- Fonte -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- JS -->
    <script defer src="index.js"></script>
</head>

<body>

    <header class="header">
        <div class="header_inner">

            <h1 class="logo">CineSearch</h1>

            <div class="search-box">

                <input
                    type="text"
                    id="searchinput"
                    class="search-box_input"
                    placeholder="Buscar filme ou série"
                >

                <button
                    id="searchbtn"
                    class="search-box_btn">
                    Pesquisar
                </button>

            </div>
        </div>
    </header>

    <main class="main">

        <section class="section">

            <h2 id="sectionTitle" class="section-title">
                Filmes em alta
            </h2>

            <div id="movieGrid" class="movies-grid"></div>

        </section>

    </main>

    <!-- Modal -->
    <div id="modalOverlay" class="modal-overlay">

        <div class="modal">

            <!-- mantém ID original -->
            <button id="modalClose" class="modal-close">
                &times;
            </button>

            <!-- mantém ID original -->
            <div id="modalContent" class="modal_body"></div>

        </div>

    </div>

</body>
</html>
