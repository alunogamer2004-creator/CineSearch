<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineSearch</title>
    <link rel="stylesheet" href="index.css">
    <script src="index.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header_inner">
            <h1 class="logo">CineSearch</h1>
            <div class="search-box">
                <input type="text"
                id="searchinput"
                class="search-box_input"
                placeholder="Buscar filme ou série"
                >
                <button id="searchbtn" class="search-box_btn">Pesquisar</button>
            </div>
        </div>
    </header>
    <main class="main">
        <section class="section">
            <h2 id="sectionTitle" class="section_title">Filmes em alta</h2>
            <div id="movieGrid" class="movies-grid"></div>
        </section>
    </main>
    <div id="modalOverlay" class="modal-overlay">
        <div class="modal">
            <div id="modalContent" class="modal_content"></div>
            <button id="modalClose" class="modal_close">&times;</button>
        </div>
    </div>
</body>
</html>
